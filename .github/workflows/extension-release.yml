name: Build Chrome Extension

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".env.example"
      - ".gitignore"
      - ".editorconfig"
      - "LICENSE*"
      - ".vscode/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-extension:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build Chrome Extension
        run: npm run build:extension

      - name: Create extension zip
        run: cd dist-extension && zip -r ../tubetrend-chrome-extension.zip .

      - name: Upload extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: tubetrend-chrome-extension
          path: tubetrend-chrome-extension.zip
          if-no-files-found: error
