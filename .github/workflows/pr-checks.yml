name: PR Checks

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".env.example"
      - ".gitignore"
      - ".editorconfig"
      - "LICENSE*"
      - ".vscode/**"

# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Format, typecheck, lint and build in a single job so dependencies are
  # installed once per run instead of once per check (previously 4 jobs each
  # ran their own `npm ci`).
  checks:
    name: Typecheck / Lint / Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Run linter (if available)
        run: |
          if npm run 2>/dev/null | grep -q "^\s*lint"; then
            echo "Running npm run lint..."
            npm run lint
          else
            echo "No lint script found in package.json - skipping"
          fi

      - name: Build project
        run: npm run build

      - name: Check build output exists
        run: |
          if [ ! -d "dist" ]; then
            echo "Build output directory 'dist' not found!"
            exit 1
          fi
          echo "Build successful - dist/ contains:"
          ls -la dist/

  # Dependency security audit (no install needed — runs off the lockfile)
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true
